<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>El lector secreto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16171d;            /* tinta profunda, azulada */
    --bg2:#1e2028;           /* superficie elevada */
    --bg3:#262933;           /* superficie más clara */
    --paper:#f5f2ea;         /* papel hueso para lectura */
    --paper2:#ece7db;
    --ink:#1c1d22;           /* texto sobre papel */
    --ink-soft:#4a4b52;
    --plum:#a8455e;          /* acento principal ciruela */
    --plum2:#c05874;
    --gold:#c9a86a;          /* dorado tenue, detalles */
    --sage:#7d8a6f;          /* verde salvia, acento inesperado */
    --text:#ecebe6;          /* texto principal claro */
    --dim:#8a8b95;           /* texto secundario */
    --line:#2e313c;          /* divisores */
    --line-soft:#22242c;
    --sans:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1180px;margin:0 auto;padding:22px 26px 90px;}
  a{color:var(--gold);cursor:pointer;text-decoration:none;}

  /* header */
  .top{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;margin-bottom:6px;padding-bottom:18px;border-bottom:2px solid var(--line);}
  .logo{display:flex;align-items:center;gap:13px;}
  .logo svg{flex-shrink:0;}
  .logo h1{font-family:var(--sans);font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1;}
  .logo small{display:block;color:var(--dim);font-size:11px;margin-top:4px;text-transform:uppercase;letter-spacing:.16em;font-weight:500;}
  .pill{display:flex;align-items:center;gap:9px;background:var(--bg2);border:1px solid var(--line);border-radius:999px;padding:7px 15px 7px 9px;}
  .pill .n{font-family:var(--sans);font-size:18px;color:var(--gold);font-weight:800;}
  .pill .l{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;font-weight:600;}
  .pill .out{font-size:11px;color:var(--dim);margin-left:6px;border-left:1px solid var(--line);padding-left:10px;text-transform:uppercase;letter-spacing:.06em;}
  .pill .out:hover{color:var(--plum2);}

  .tabs{display:flex;gap:2px;margin:0 0 26px;flex-wrap:wrap;}
  .tab{font-family:var(--sans);font-size:12.5px;font-weight:600;color:var(--dim);background:none;border:none;padding:10px 15px;cursor:pointer;border-radius:999px;text-transform:uppercase;letter-spacing:.05em;transition:.15s;}
  .tab.on{color:var(--bg);background:var(--gold);}
  .tab:hover:not(.on){color:var(--text);background:var(--bg2);}

  /* layout dos columnas */
  .layout{display:grid;grid-template-columns:1fr 320px;gap:34px;align-items:start;}
  .col-main{min-width:0;}
  .col-side{min-width:0;position:sticky;top:20px;}
  @media(max-width:860px){ .layout{grid-template-columns:1fr;} .col-side{position:static;} }

  .card{background:var(--paper);color:var(--ink);border-radius:8px;padding:22px 24px;margin-bottom:16px;box-shadow:0 8px 30px rgba(0,0,0,.22);position:relative;overflow:hidden;transition:transform .16s ease, box-shadow .16s ease;}
  .card:hover{transform:translateY(-2px);box-shadow:0 12px 38px rgba(0,0,0,.28);}
  .ci{position:relative;}
  .tag{display:inline-block;font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;background:transparent;color:var(--plum);border:1px solid rgba(168,69,94,.35);padding:3px 9px;border-radius:999px;margin-right:6px;margin-bottom:2px;}
  .ttl{font-family:var(--sans);font-size:21px;font-weight:800;letter-spacing:-.015em;margin:9px 0 4px;line-height:1.12;}
  .meta{font-size:12px;color:var(--ink-soft);margin-bottom:10px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .meta span{margin:0;}
  .syn{font-size:14px;color:#3f3a2e;white-space:pre-wrap;}

  .btn{font-family:var(--sans);font-size:13px;font-weight:700;border:none;border-radius:999px;padding:10px 20px;cursor:pointer;transition:.12s;letter-spacing:.01em;}
  .btn:active{transform:scale(.97);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .b-wine{background:var(--plum);color:#fff;} .b-wine:hover{background:var(--plum2);}
  .b-gold{background:var(--gold);color:#1c1d22;} .b-gold:hover{filter:brightness(1.07);}
  .b-ghost{background:transparent;color:var(--text);border:1px solid var(--line);} .b-ghost:hover{border-color:var(--gold);color:var(--gold);}
  .b-ghost-d{background:transparent;color:var(--ink);border:1px solid #cfc6b4;} .b-ghost-d:hover{border-color:var(--plum);color:var(--plum);}
  .sm{padding:7px 15px;font-size:12px;}
  .row{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-top:14px;}

  .empty{text-align:center;padding:44px 18px;color:var(--dim);border:1px dashed var(--line);border-radius:8px;font-size:14px;}
  .hint{font-size:12.5px;color:var(--dim);margin-bottom:18px;line-height:1.6;}
  .section-head{margin:6px 0 20px;}
  .section-head h2{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:5px;}
  .section-head p{font-size:12.5px;color:var(--dim);line-height:1.6;max-width:560px;}

  /* === Título neón estilo Bates Motel === */
  .logo h1{font-family:var(--sans);}
  .neon-title{white-space:nowrap;}
  .neon-dim{color:#cfc9bd;opacity:.82;font-weight:700;}
  .neon-secreto{
    color:#d8fff5;
    font-weight:800;
    animation:neonFlicker 4.2s infinite;
    text-shadow:
      0 0 4px #bafff2, 0 0 7px #35e6cf, 0 0 13px #16b8a6,
      0 0 22px #0e8f82, 0 0 34px #0a6b62;
  }
  @keyframes neonFlicker{
    0%,18%,22%,25%,53%,57%,100%{
      opacity:1;
      text-shadow:0 0 4px #bafff2,0 0 7px #35e6cf,0 0 13px #16b8a6,0 0 22px #0e8f82,0 0 34px #0a6b62;
    }
    19%,21%,54%,56%{
      opacity:.55;
      text-shadow:0 0 3px #35e6cf,0 0 6px #16b8a6;
    }
    20%,55%{
      opacity:.15;
      text-shadow:none;
    }
  }
  @media(prefers-reduced-motion:reduce){ .neon-secreto{animation:none;} }

  .group-head{background:linear-gradient(155deg,#20222b,#292c37);border:1px solid var(--line);border-radius:12px;padding:20px 22px;margin-bottom:22px;}
  .group-head #back{margin-bottom:12px;}
  .group-head h2{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:12px;color:var(--text);}
  .group-members{font-size:12.5px;color:var(--dim);line-height:2;}
  .gm-label{text-transform:uppercase;letter-spacing:.1em;font-size:10.5px;font-weight:700;color:var(--gold);margin-right:6px;}
  .gm-chip{display:inline-block;background:rgba(201,168,106,.12);color:var(--text);border:1px solid var(--line);padding:3px 11px;border-radius:999px;margin:0 4px 4px 0;font-size:12px;}

  /* forms */
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:6px;}
  .dark .field label{color:var(--dim);}
  input,select,textarea{width:100%;padding:10px 11px;border:1px solid #c4b593;border-radius:4px;font-family:var(--sans);font-size:14px;background:#faf7ef;color:var(--ink);}
  .dark input,.dark select,.dark textarea{background:var(--bg2);border-color:var(--line);color:var(--text);}
  textarea{resize:vertical;}

  /* modal */
  .ov{position:fixed;inset:0;background:rgba(10,8,7,.74);display:flex;align-items:flex-start;justify-content:center;padding:38px 15px;overflow-y:auto;z-index:50;}
  .modal{background:var(--paper);color:var(--ink);border-radius:12px;max-width:600px;width:100%;padding:28px 28px;box-shadow:0 24px 70px rgba(0,0,0,.6);}
  .modal h2{font-family:var(--sans);font-size:21px;margin-bottom:4px;}
  .modal .sub{font-size:12.5px;color:#6a6152;margin-bottom:16px;}
  .mact{display:flex;justify-content:flex-end;gap:9px;margin-top:16px;}

  .nda{background:#ece7db;border:1px solid #d8d0bf;border-radius:5px;padding:13px 15px;font-size:13px;color:#3f3a2e;margin-bottom:14px;}
  .nda b{color:var(--plum);}
  .nda ul{margin:7px 0 0 17px;}
  .chk{display:flex;gap:9px;align-items:flex-start;font-size:13.5px;margin-top:10px;}
  .chk input{width:auto;margin-top:3px;}

  .reader{background:#faf7ef;border:1px solid #e0d9c9;border-radius:8px;padding:20px 22px;max-height:340px;overflow-y:auto;font-size:15.5px;white-space:pre-wrap;margin-bottom:16px;font-family:var(--sans);font-weight:400;line-height:1.8;color:#2a2b30;letter-spacing:.002em;}

  .rv{border-top:1px solid #d9caae;padding-top:11px;margin-top:11px;}
  .rv:first-child{border-top:none;margin-top:0;padding-top:0;}
  .rv .who{display:flex;justify-content:space-between;font-size:12px;color:#6a6152;margin-bottom:5px;}
  .rv .who b{color:var(--ink);}
  .rv p{font-size:13.5px;margin-bottom:3px;} .rv p b{color:var(--plum);}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--gold);color:var(--text);padding:10px 18px;border-radius:5px;font-size:13.5px;z-index:60;box-shadow:0 8px 22px rgba(0,0,0,.45);}
  .err{color:#e08a8a;font-size:13px;margin-top:8px;}

  /* auth screen */
  .authbox{max-width:400px;margin:8vh auto 0;}
  .authbox .card::before{display:none;}
  .auth-tagline{text-align:center;font-family:var(--sans);font-style:italic;font-size:16px;color:var(--gold);line-height:1.5;margin-bottom:26px;opacity:.92;}
  body{background:var(--bg);background-image:radial-gradient(rgba(195,155,82,.045) 1px,transparent 1px);background-size:22px 22px;}
  .switch{text-align:center;font-size:13px;color:var(--dim);margin-top:16px;}
  .costnote{font-size:12px;color:#6a6152;background:#ece7db;border-radius:4px;padding:8px 11px;margin-top:6px;}

  /* estrellas */
  .stars{display:inline-flex;gap:2px;cursor:pointer;}
  .stars.ro{cursor:default;}
  .star{position:relative;width:24px;height:24px;color:#c9b78f;}
  .stars.ro .star{width:17px;height:17px;}
  .star svg{width:100%;height:100%;display:block;}
  .star .fill{position:absolute;top:0;left:0;height:100%;overflow:hidden;color:var(--gold);}
  .rate-line{display:flex;align-items:center;gap:10px;margin-top:4px;}
  .rate-val{font-family:var(--sans);font-size:15px;color:var(--plum);font-weight:700;}
  .avg-badge{display:inline-flex;align-items:center;gap:6px;background:#ece7db;border-radius:999px;padding:3px 11px 3px 8px;font-size:12.5px;color:#544b3a;margin-left:7px;}
  .avg-badge .n{font-family:var(--sans);font-weight:700;color:var(--plum);}

  /* alias + descubrir */
  .alias{display:inline-flex;align-items:center;gap:5px;font-family:var(--sans);color:var(--plum);font-style:italic;}
  .alias svg{width:14px;height:14px;}
  .reveal-row{margin-top:8px;display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
  .reveal-note{font-size:12px;color:#7a7060;font-style:italic;}
  .revealed{font-size:12.5px;color:#2e6b3e;font-weight:600;}

  /* avisos de pedidos */
  .notice{background:var(--bg2);border:1px solid var(--gold);border-radius:6px;padding:14px 16px;margin-bottom:16px;}
  .notice h3{font-family:var(--sans);font-size:15.5px;color:var(--gold);margin-bottom:8px;}
  .notice .pend{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line);flex-wrap:wrap;}
  .notice .pend:first-of-type{border-top:none;}
  .notice .pend .t{font-size:13.5px;color:var(--text);}

  /* como funciona / ayuda */
  .help-btn{background:transparent;border:1px solid var(--line);color:var(--dim);border-radius:999px;width:26px;height:26px;font-size:14px;cursor:pointer;line-height:1;margin-left:8px;}
  .help-btn:hover{border-color:var(--gold);color:var(--gold);}
  .how h2{margin-bottom:14px;}
  .how-step{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;}
  .how-num{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--plum);color:#f4ece2;font-family:var(--sans);font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;}
  .how-step .txt{font-size:13.8px;color:#3f3a2e;}
  .how-step .txt b{color:var(--plum);}
  .how-table{background:#ece7db;border-radius:5px;padding:12px 14px;font-size:13px;color:#3f3a2e;margin:4px 0 14px;}
  .how-table div{padding:3px 0;}
  .charcount{font-size:12px;color:#6a6152;margin-top:5px;}
  .charcount b{color:var(--plum);}
  .selftext{background:#faf7ef;border:1px solid #d8d0bf;border-radius:5px;padding:12px 14px;font-size:14px;white-space:pre-wrap;font-family:var(--sans);line-height:1.6;color:var(--ink);max-height:220px;overflow-y:auto;margin-top:10px;}

  /* texto de la semana - portada de revista */
  .featured{position:relative;background:linear-gradient(155deg,#1f2129,#2a2d38);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:30px;}
  .featured::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--plum),var(--gold),var(--sage));}
  .feat-grid{display:grid;grid-template-columns:1.05fr 1fr;gap:0;align-items:stretch;}
  .feat-side{padding:32px 30px;display:flex;flex-direction:column;justify-content:center;}
  .feat-eyebrow{font-size:10.5px;text-transform:uppercase;letter-spacing:.22em;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:8px;font-weight:700;}
  .feat-eyebrow svg{width:14px;height:14px;}
  .feat-genre{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--sage);font-weight:700;margin-bottom:12px;}
  .feat-title{font-family:var(--sans);font-size:34px;line-height:1.04;font-weight:800;letter-spacing:-.025em;margin-bottom:12px;color:var(--text);}
  .feat-author{font-size:13px;color:var(--dim);margin-bottom:18px;}
  .feat-author b{color:var(--text);font-weight:600;}
  .feat-stars{display:flex;align-items:center;gap:9px;margin-bottom:20px;}
  .feat-stars .rate-val{color:var(--gold);font-size:14px;font-weight:700;}
  .feat-body{padding:32px 32px 32px 0;position:relative;display:flex;flex-direction:column;justify-content:center;border-left:1px solid var(--line);padding-left:32px;}
  .feat-quote{font-family:var(--sans);font-size:15px;line-height:1.75;color:#d6d5cf;font-weight:300;position:relative;white-space:pre-wrap;max-height:230px;overflow:hidden;}
  .feat-fade{position:absolute;left:32px;right:32px;bottom:32px;height:80px;background:linear-gradient(transparent,#25283180);pointer-events:none;}
  .feat-read{margin-top:16px;}
  .feat-like{margin-top:14px;}
  .likebtn{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--dim);border-radius:999px;padding:6px 15px;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--sans);transition:.14s;}
  .likebtn:hover{border-color:var(--plum);color:var(--plum2);}
  .likebtn.on{background:var(--plum);border-color:var(--plum);color:#fff;}
  @media(max-width:620px){ .feat-grid{grid-template-columns:1fr;} }

  /* columna editorial (lado derecho) */
  .side-head{font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--gold);font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;}
  .ed-card{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:17px 18px;margin-bottom:14px;transition:.15s;}
  .ed-card:hover{border-color:var(--line);background:var(--bg3);}
  .ed-kind{display:inline-block;font-size:9px;text-transform:uppercase;letter-spacing:.12em;font-weight:700;padding:2px 8px;border-radius:999px;margin-bottom:9px;}
  .ed-kind.nota{background:rgba(201,168,106,.15);color:var(--gold);}
  .ed-kind.cuento{background:rgba(168,69,94,.18);color:var(--plum2);}
  .ed-kind.noticia{background:rgba(125,138,111,.18);color:var(--sage);}
  .ed-title{font-size:16px;font-weight:800;letter-spacing:-.01em;line-height:1.2;margin-bottom:7px;color:var(--text);}
  .ed-body{font-size:13px;line-height:1.6;color:var(--dim);white-space:pre-wrap;}
  .ed-more{background:none;border:none;color:var(--gold);font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer;padding:8px 0 0;display:block;}
  .ed-more:hover{color:var(--plum2);}
  .ed-link{display:block;margin-top:12px;font-size:11.5px;color:var(--sage);font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
  .ed-link:hover{color:var(--gold);}
  .ed-modal-body{font-size:15px;line-height:1.78;color:#2a2b30;white-space:pre-wrap;margin:14px 0 18px;max-height:50vh;overflow-y:auto;}
  .ed-date{font-size:10.5px;color:var(--dim);margin-top:10px;text-transform:uppercase;letter-spacing:.05em;opacity:.7;}
  .ed-del{float:right;font-size:11px;color:var(--dim);cursor:pointer;border:none;background:none;}
  .ed-del:hover{color:var(--plum2);}
  .ed-compose{background:var(--bg2);border:1px dashed var(--line);border-radius:10px;padding:16px 17px;margin-bottom:14px;}
  .ed-compose input,.ed-compose textarea,.ed-compose select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:6px;font-family:var(--sans);font-size:13px;background:var(--bg);color:var(--text);margin-bottom:9px;}

  /* escritores - comunidad */
  .writers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
  .wcard{background:var(--paper);color:var(--ink);border-radius:10px;padding:22px 18px;box-shadow:0 8px 24px rgba(0,0,0,.24);display:flex;flex-direction:column;align-items:center;text-align:center;transition:transform .16s ease;}
  .wcard:hover{transform:translateY(-3px);}
  .wavatar{width:76px;height:76px;border-radius:50%;object-fit:cover;background:linear-gradient(145deg,var(--plum),#7d3348);color:#f3e9dc;display:flex;align-items:center;justify-content:center;font-family:var(--sans);font-size:30px;font-weight:800;margin-bottom:13px;border:2px solid var(--gold);}
  .wname{font-family:var(--sans);font-size:17px;font-weight:800;letter-spacing:-.01em;margin-bottom:5px;}
  .wrole{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;background:rgba(168,69,94,.12);color:var(--plum);padding:3px 11px;border-radius:999px;margin-bottom:10px;}
  .wbio{font-size:13px;color:#4f4838;line-height:1.55;margin-bottom:12px;}
  .wstats{font-size:11px;color:#8a7f6c;border-top:1px solid #e0d9c9;padding-top:10px;width:100%;text-transform:uppercase;letter-spacing:.03em;}
  .wstats b{color:var(--plum);font-weight:800;}

  /* avatar uploader en perfil */
  .avatar-edit{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
  .avatar-prev{width:64px;height:64px;border-radius:50%;object-fit:cover;background:var(--plum);color:#f3e9dc;display:flex;align-items:center;justify-content:center;font-family:var(--sans);font-size:24px;font-weight:700;border:2px solid #c4b593;flex-shrink:0;}

  /* admin */
  .adm-stats{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
  .adm-stat{background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:14px 18px;flex:1;min-width:120px;}
  .adm-stat .n{font-family:var(--sans);font-size:26px;color:var(--gold);font-weight:700;}
  .adm-stat .l{font-size:11.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;}
  .adm-sec{font-family:var(--sans);font-size:17px;color:var(--text);margin:18px 0 10px;}
  .adm-table{width:100%;border-collapse:collapse;background:var(--paper);color:var(--ink);border-radius:6px;overflow:hidden;font-size:12.5px;}
  .adm-table th{background:var(--plum);color:#f3e9dc;text-align:left;padding:8px 10px;font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;}
  .adm-table td{padding:8px 10px;border-top:1px solid #e0d2b6;}
  .adm-trash{background:none;border:none;cursor:pointer;font-size:14px;opacity:.55;transition:.12s;padding:2px 4px;border-radius:4px;}
  .adm-trash:hover{opacity:1;background:rgba(168,69,94,.12);}
  .adm-lock{opacity:.5;font-size:13px;}
  .adm-table tr:nth-child(even) td{background:#ece2cf;}
  .adm-wrap{overflow-x:auto;margin-bottom:8px;}
  .regstamp{font-size:11.5px;color:#8a7f6c;margin-top:8px;font-style:italic;}

  /* campanita */
  .bell{position:relative;background:transparent;border:1px solid var(--line);color:var(--dim);border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.12s;}
  .bell:hover{border-color:var(--gold);color:var(--gold);}
  .bell-badge{position:absolute;top:-4px;right:-4px;background:var(--plum);color:#fff;font-size:10.5px;font-weight:700;min-width:18px;height:18px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--bg);}

  /* tarjetas de notificacion */
  .notif-card{display:flex;gap:14px;background:var(--paper);color:var(--ink);border-radius:6px;padding:16px 18px;margin-bottom:13px;box-shadow:0 5px 16px rgba(0,0,0,.26);animation:fadein .35s ease;}
  .notif-ico{flex-shrink:0;width:40px;height:40px;border-radius:50%;background:var(--plum);color:#f3e9dc;display:flex;align-items:center;justify-content:center;}
  .notif-ico svg{width:20px;height:20px;}
  .notif-ico.gold{background:var(--gold);color:#3a2a12;}
  .notif-title{font-family:var(--sans);font-size:16px;font-weight:700;margin-bottom:4px;}
  .notif-txt{font-size:13.5px;color:#4a4436;line-height:1.5;margin-bottom:10px;}
  .notif-actions{display:flex;gap:9px;flex-wrap:wrap;}

  /* estados vacios calidos */
  .empty-art{display:flex;flex-direction:column;align-items:center;text-align:center;padding:52px 24px;color:var(--dim);}
  .empty-art-ico{width:56px;height:56px;color:var(--gold);opacity:.6;margin-bottom:16px;}
  .empty-art-ico svg{width:100%;height:100%;}
  .empty-art-txt{font-family:var(--sans);font-size:16px;color:var(--text);line-height:1.5;}
  .empty-art-txt span{font-family:var(--sans);font-size:13px;color:var(--dim);}

  @keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .card,.wcard,.featured{animation:fadein .35s ease;}
  .reward-chip{display:inline-block;background:#ece7db;color:#6b5a2e;font-size:11.5px;font-weight:600;padding:2px 9px;border-radius:999px;}
  .reward-banner{background:#ece7db;border:1px solid #d3c39c;border-radius:5px;padding:10px 13px;font-size:13px;color:#5a4f36;margin-bottom:14px;}
  .reward-banner b{color:var(--plum);}

  /* ===== Ajustes para celular ===== */
  @media(max-width:620px){
    .wrap{padding:16px 15px 70px;}
    /* Cabecera / masthead */
    .top{padding-bottom:14px;margin-bottom:4px;}
    .logo h1{font-size:23px;}
    .logo small{font-size:9.5px;letter-spacing:.12em;}
    .logo svg{width:34px;height:34px;}
    .pill{padding:6px 12px 6px 8px;}
    .pill .n{font-size:16px;}
    .bell{width:34px;height:34px;}
    /* Tabs: un poco más compactas */
    .tabs{gap:2px;margin-bottom:20px;}
    .tab{font-size:11px;padding:8px 12px;letter-spacing:.03em;}
    /* Secciones */
    .section-head h2{font-size:19px;}
    .section-head p{font-size:12px;}
    /* Tarjetas de texto */
    .card{padding:17px 17px;border-radius:9px;}
    .ttl{font-size:18px;}
    .tag{font-size:9px;}
    /* Texto de la semana */
    .featured{margin-bottom:22px;}
    .feat-side{padding:22px 20px 6px;}
    .feat-body{padding:6px 20px 24px;border-left:none;padding-left:20px;}
    .feat-title{font-size:25px;}
    .feat-eyebrow{font-size:9.5px;margin-bottom:12px;}
    .feat-quote{font-size:14px;max-height:180px;}
    .feat-fade{left:20px;right:20px;bottom:24px;}
    /* Columna del editor */
    .side-head{font-size:10.5px;margin-top:8px;}
    .ed-card{padding:15px 16px;}
    .ed-title{font-size:15px;}
    .ed-body{font-size:12.5px;}
    /* Comunidad */
    .writers-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
    .wcard{padding:18px 14px;}
    .wavatar{width:64px;height:64px;font-size:26px;}
    .wname{font-size:15px;}
    /* Modales: ocupar mejor la pantalla chica */
    .modal{padding:22px 20px;border-radius:12px;}
    .modal h2{font-size:19px;}
    .reader{font-size:15px;padding:16px 17px;line-height:1.75;}
    /* Formularios */
    .field label{font-size:10.5px;}
    input,select,textarea{font-size:16px;} /* 16px evita el zoom automático de iOS */
    /* Notificaciones */
    .notif-card{padding:14px 15px;gap:11px;}
    .notif-title{font-size:15px;}
    .notif-txt{font-size:13px;}
    /* Panel admin: tablas con scroll horizontal ya activo, texto más chico */
    .adm-table{font-size:11.5px;}
    .adm-stat{padding:12px 14px;min-width:100px;}
    .adm-stat .n{font-size:22px;}
  }
  /* Pantallas muy angostas (celulares chicos) */
  @media(max-width:380px){
    .feat-title{font-size:22px;}
    .logo h1{font-size:21px;}
    .tab{font-size:10.5px;padding:7px 10px;}
  }
</style>
</head>
<body>
<div id="app" class="wrap"></div>

<script>
const $ = (h) => { const t=document.createElement('template'); t.innerHTML=h.trim(); return t.content.firstChild; };
let ME=null, TAB='sala', GROUP_CTX=0, GROUPS_CACHE=[];

function logoSVG(){
  return `<svg width="42" height="42" viewBox="0 0 42 42">
    <rect x="1.5" y="1.5" width="39" height="39" rx="9" fill="#1e2028" stroke="#2e313c" stroke-width="1.5"/>
    <path d="M9 21 Q21 11 33 21 Q21 31 9 21 Z" fill="none" stroke="#c9a86a" stroke-width="1.6"/>
    <circle cx="21" cy="21" r="4.6" fill="#a8455e"/>
    <circle cx="22.4" cy="19.6" r="1.4" fill="#f5f2ea"/>
  </svg>`;
}
function neonTitle(){
  return `<span class="neon-title"><span class="neon-dim">El lector</span> <span class="neon-secreto">secreto</span></span>`;
}
function toast(msg){
  const el=$(`<div class="toast">${msg}</div>`);
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2900);
}
async function api(url, body, method){
  const opt={headers:{'Content-Type':'application/json'}};
  if(method){ opt.method=method; if(body) opt.body=JSON.stringify(body); }
  else if(body){opt.method='POST';opt.body=JSON.stringify(body);}
  const r=await fetch(url,opt);
  const d=await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(d.error||'Error');
  return d;
}

function showHowItWorks(welcome){
  const ov=$(`<div class="ov"></div>`);
  const m=$(`<div class="modal how">
    <h2>${welcome?'¡Bienvenido/a a El lector secreto!':'Cómo funciona'}</h2>
    <div class="how-step"><div class="how-num">1</div><div class="txt">Somos una comunidad de escritores que se leen entre sí. Acá <b>das para recibir</b>: leés textos de otros y a cambio ganás créditos para que lean el tuyo.</div></div>
    <div class="how-step"><div class="how-num">2</div><div class="txt">Cada vez que leés un texto y dejás una <b>devolución completa</b> (qué funciona, qué mejorar, impresión general y una puntuación con estrellas), ganás créditos:</div></div>
    <div class="how-table">
      <div>📖 <b>Leés</b> y dejás devolución → ganás <b>2 créditos por cada tramo de 5 carillas</b> del texto (hasta 5 → 2; hasta 10 → 4; hasta 15 → 6…).</div>
      <div>✍️ <b>Publicás</b> → cuesta <b>1 crédito por lector cada 5 carillas</b> (hasta 5 → 1 c/u; hasta 10 → 2 c/u; hasta 15 → 3 c/u…).</div>
      <div>La plataforma calcula todo sola según el largo de tu texto. No tenés que elegir nada.</div>
    </div>
    <div class="how-step"><div class="how-num">3</div><div class="txt">Las devoluciones son <b>anónimas</b> (llegan de un "Lector secreto") para que la crítica sea honesta. Si una te gustó, podés <b>pedir descubrir</b> quién la escribió, y si esa persona acepta, se revela y pueden conectar.</div></div>
    <div class="how-step"><div class="how-num">4</div><div class="txt">Antes de leer una obra ajena aceptás un <b>compromiso de confidencialidad</b>: no se copian ni se roban las obras. Es la regla de oro de la comunidad.</div></div>
    <div class="mact"><button class="btn b-wine" id="ok">${welcome?'Empezar':'Entendido'}</button></div>
  </div>`);
  ov.appendChild(m); document.body.appendChild(ov);
  m.querySelector('#ok').onclick=()=>ov.remove();
  ov.onclick=(e)=>{if(e.target===ov)ov.remove();};
}

// ---------- AUTH ----------
function renderAuth(mode='login'){
  const app=document.getElementById('app'); app.innerHTML='';
  const box=$(`<div class="authbox"></div>`);
  box.appendChild($(`<div class="logo" style="justify-content:center;margin-bottom:6px">${logoSVG()}
    <div><h1>${neonTitle()}</h1></div></div>`));
  box.appendChild($(`<p class="auth-tagline">Donde las historias se leen<br>antes de existir del todo.</p>`));

  const card=$(`<div class="card"><div class="ci"></div></div>`);
  const ci=card.querySelector('.ci');
  ci.appendChild($(`<h2 class="ttl">${mode==='login'?'Ingresar':'Crear cuenta'}</h2>`));

  let nameF, secQF, secAF;
  if(mode==='register'){
    nameF=$(`<input placeholder="Tu nombre o seudónimo">`);
    ci.appendChild(wrapField('Nombre', nameF));
  }
  const emailF=$(`<input type="email" placeholder="tu@email.com">`);
  const passF=$(`<input type="password" placeholder="••••••••">`);
  ci.appendChild(wrapField('Email', emailF));
  ci.appendChild(wrapField('Contraseña', passF));
  if(mode==='register'){
    secQF=$(`<select>
      <option value="">— Elegí una pregunta —</option>
      <option>¿Cuál es tu ciudad natal?</option>
      <option>¿Cómo se llamaba tu primera mascota?</option>
      <option>¿Cuál es tu libro favorito?</option>
      <option>¿Cómo se llama tu mejor amigo/a de la infancia?</option>
      <option>¿Cuál fue tu primer trabajo?</option>
    </select>`);
    secAF=$(`<input placeholder="Tu respuesta (la vas a necesitar si olvidás la clave)">`);
    ci.appendChild(wrapField('Pregunta de seguridad', secQF));
    ci.appendChild(wrapField('Respuesta', secAF));
  }
  const err=$(`<div class="err" style="display:none"></div>`);
  ci.appendChild(err);

  const btn=$(`<button class="btn b-wine" style="width:100%;margin-top:6px">${mode==='login'?'Ingresar':'Crear cuenta y entrar'}</button>`);
  btn.onclick=async()=>{
    err.style.display='none';
    try{
      let isNew=false;
      if(mode==='login') ME=await api('/api/login',{email:emailF.value,pass:passF.value});
      else { ME=await api('/api/register',{name:nameF.value,email:emailF.value,pass:passF.value,sec_question:secQF.value,sec_answer:secAF.value}); isNew=true; }
      renderApp();
      if(isNew) showHowItWorks(true);
    }catch(e){err.textContent=e.message;err.style.display='block';}
  };
  passF.onkeydown=(e)=>{if(e.key==='Enter')btn.click();};
  ci.appendChild(btn);
  card.appendChild($(`<div></div>`));
  box.appendChild(card);

  const sw=$(`<div class="switch">${mode==='login'
    ? '¿No tenés cuenta? <a id="sw">Registrate</a><br><a id="rec" style="font-size:12px">Olvidé mi contraseña</a>'
    : '¿Ya tenés cuenta? <a id="sw">Ingresá</a>'}</div>`);
  box.appendChild(sw);
  app.appendChild(box);
  document.getElementById('sw').onclick=()=>renderAuth(mode==='login'?'register':'login');
  const recLink=document.getElementById('rec');
  if(recLink) recLink.onclick=()=>renderRecover();
}

// ---------- RECUPERAR CONTRASEÑA ----------
function renderRecover(){
  const app=document.getElementById('app'); app.innerHTML='';
  const box=$(`<div class="authbox"></div>`);
  box.appendChild($(`<div class="logo" style="justify-content:center;margin-bottom:6px">${logoSVG()}<div><h1>${neonTitle()}</h1></div></div>`));
  box.appendChild($(`<p class="auth-tagline">Recuperá tu acceso.</p>`));
  const card=$(`<div class="card"><div class="ci"></div></div>`);
  const ci=card.querySelector('.ci');
  ci.appendChild($(`<h2 class="ttl">Recuperar contraseña</h2>`));
  const emailF=$(`<input type="email" placeholder="tu@email.com">`);
  ci.appendChild(wrapField('Tu email', emailF));
  const err=$(`<div class="err" style="display:none"></div>`); ci.appendChild(err);
  const step2=$(`<div style="display:none"></div>`);
  const qLabel=$(`<div class="field"><label>Pregunta de seguridad</label><div id="qtext" style="font-size:14px;color:var(--ink);margin-bottom:8px"></div></div>`);
  const ansF=$(`<input placeholder="Tu respuesta">`);
  const newPassF=$(`<input type="password" placeholder="Nueva contraseña">`);
  step2.appendChild(qLabel); step2.appendChild(wrapField('Respuesta', ansF)); step2.appendChild(wrapField('Nueva contraseña', newPassF));
  ci.appendChild(step2);

  const btn=$(`<button class="btn b-wine" style="width:100%;margin-top:6px">Continuar</button>`);
  ci.appendChild(btn);
  let phase=1;
  btn.onclick=async()=>{
    err.style.display='none';
    try{
      if(phase===1){
        const d=await api('/api/recover/question',{email:emailF.value});
        qLabel.querySelector('#qtext').textContent=d.question;
        step2.style.display='block'; emailF.disabled=true; btn.textContent='Cambiar contraseña'; phase=2;
      } else {
        await api('/api/recover/reset',{email:emailF.value,answer:ansF.value,new_pass:newPassF.value});
        toast('¡Contraseña actualizada! Ya podés ingresar.');
        renderAuth('login');
      }
    }catch(e){err.textContent=e.message;err.style.display='block';}
  };
  card.appendChild($(`<div></div>`));
  box.appendChild(card);
  box.appendChild($(`<div class="switch"><a id="back">← Volver a ingresar</a></div>`));
  app.appendChild(box);
  document.getElementById('back').onclick=()=>renderAuth('login');
}
function wrapField(label, input){
  const f=$(`<div class="field"><label>${label}</label></div>`);
  f.appendChild(input); return f;
}

// ---------- APP SHELL ----------
function renderApp(){
  const app=document.getElementById('app'); app.innerHTML='';
  const notifCount = window.__notifCount||0;
  const bell = `<button class="bell" id="bell" title="Notificaciones">${bellSVG()}${notifCount>0?`<span class="bell-badge">${notifCount}</span>`:''}</button>`;
  app.appendChild($(`<div class="top">
    <div class="logo">${logoSVG()}<div style="display:flex;align-items:center"><div><h1>${neonTitle()}</h1><small>Hola, ${ME.name}</small></div><button class="help-btn" id="help" title="Cómo funciona">?</button></div></div>
    <div style="display:flex;align-items:center;gap:12px">
      ${bell}
      <div class="pill"><span class="n">${ME.credits}</span><span class="l">créditos</span>
        <a class="out" id="logout">Salir</a></div>
    </div>
  </div>`));

  const tabs=$(`<div class="tabs">
    <button class="tab ${TAB==='sala'?'on':''}" data-t="sala">Sala de lectura</button>
    <button class="tab ${TAB==='pub'?'on':''}" data-t="pub">Publicar</button>
    <button class="tab ${TAB==='grupos'?'on':''}" data-t="grupos">Grupos</button>
    <button class="tab ${TAB==='mios'?'on':''}" data-t="mios">Mis textos</button>
    <button class="tab ${TAB==='escritores'?'on':''}" data-t="escritores">Escritores</button>
    <button class="tab ${TAB==='perfil'?'on':''}" data-t="perfil">Perfil</button>
    ${ME.is_admin?`<button class="tab ${TAB==='admin'?'on':''}" data-t="admin">Admin</button>`:''}
  </div>`);
  app.appendChild(tabs);
  tabs.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{TAB=b.dataset.t;GROUP_CTX=0;renderApp();});
  document.getElementById('logout').onclick=async()=>{await api('/api/logout',{});ME=null;renderAuth();};
  document.getElementById('help').onclick=()=>showHowItWorks(false);
  document.getElementById('bell').onclick=()=>{TAB='notif';renderApp();};

  const body=$(`<div id="body"></div>`); app.appendChild(body);
  if(TAB==='sala'){
    const layout=$(`<div class="layout"><div class="col-main"></div><div class="col-side"></div></div>`);
    body.appendChild(layout);
    renderSala(layout.querySelector('.col-main'), 0);
    renderEditorial(layout.querySelector('.col-side'));
  }
  else if(TAB==='grupos') renderGrupos(body);
  else if(TAB==='grupo-sala'){
    const layout=$(`<div class="layout"><div class="col-main"></div><div class="col-side"></div></div>`);
    body.appendChild(layout);
    renderGrupoSala(layout.querySelector('.col-main'), layout.querySelector('.col-side'));
  }
  else if(TAB==='escritores') renderEscritores(body);
  else if(TAB==='pub') renderPub(body);
  else if(TAB==='mios') renderMios(body);
  else if(TAB==='notif') renderNotificaciones(body);
  else if(TAB==='admin' && ME.is_admin) renderAdmin(body);
  else renderPerfil(body);
  refreshNotifCount();
}

// Refresca el contador de la campanita sin recargar toda la vista
async function refreshNotifCount(){
  try{
    const d=await api('/api/notifications');
    const prev=window.__notifCount||0;
    window.__notifCount=d.count;
    if(d.count!==prev){
      // Actualizar solo el badge y el texto de la solapa
      const bell=document.getElementById('bell');
      if(bell){
        const old=bell.querySelector('.bell-badge'); if(old) old.remove();
        if(d.count>0) bell.appendChild($(`<span class="bell-badge">${d.count}</span>`));
      }
    }
  }catch(e){/* silencioso */}
}
function bellSVG(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>`; }

// ---------- NOTIFICACIONES ----------
async function renderNotificaciones(el){
  el.innerHTML='';
  let data;
  try{data=await api('/api/notifications');}catch(e){toast(e.message);return;}
  window.__notifCount=data.count;
  el.appendChild($(`<div class="section-head"><h2>Notificaciones</h2><p>Pedidos para descubrirte y avisos sobre tus textos destacados.</p></div>`));
  if(!data.notes.length){
    el.appendChild($(`<div class="empty-art"><div class="empty-art-ico">${bellSVG()}</div><div class="empty-art-txt">No tenés notificaciones por ahora.<br><span>Cuando alguien quiera descubrirte o tu texto sea elegido, aparecerá acá.</span></div></div>`));
    return;
  }
  data.notes.forEach(nt=>{
    if(nt.kind==='reveal'){
      const c=$(`<div class="notif-card">
        <div class="notif-ico">${eyeMini()}</div>
        <div class="notif-body">
          <div class="notif-title">Alguien quiere descubrirte</div>
          <div class="notif-txt"><b>${esc(nt.author_name)}</b> quiere saber que fuiste vos quien leyó “${esc(nt.title)}”.</div>
          <div class="notif-actions"></div>
        </div>
      </div>`);
      const acts=c.querySelector('.notif-actions');
      const yes=$(`<button class="btn b-gold sm">Descubrirme</button>`);
      const no=$(`<button class="btn b-ghost-d sm">Seguir en secreto</button>`);
      yes.onclick=async()=>{ try{ await api('/api/reveal/respond',{review_id:nt.id,accept:true}); toast('¡Te descubriste! Ahora pueden conectar.'); renderApp(); }catch(e){toast(e.message);} };
      no.onclick=async()=>{ try{ await api('/api/reveal/respond',{review_id:nt.id,accept:false}); toast('Listo, seguís en secreto.'); renderApp(); }catch(e){toast(e.message);} };
      acts.appendChild(yes); acts.appendChild(no);
      el.appendChild(c);
    } else if(nt.kind==='featured'){
      const fromGroup = nt.from_group;
      const title = fromGroup ? '¡Tu texto brilla en el grupo! 🌟' : '¡Tu texto fue elegido! 🌟';
      const txt = fromGroup
        ? `Tu texto <b>“${esc(nt.title)}”</b> es el texto de la semana del grupo <b>${esc(nt.group_name||'')}</b>, y además tiene mejor puntaje que el destacado de la comunidad general. ¿Querés que también aparezca como Texto de la semana en la <b>comunidad general</b> (lo verá todo el mundo), o preferís que quede <b>solo en el grupo</b>?`
        : `Tu texto <b>“${esc(nt.title)}”</b> es el mejor puntuado de la semana. ¿Querés que se muestre <b>públicamente</b> a toda la comunidad como Texto de la semana? (Hasta ahora solo lo vieron tus lectores secretos.)`;
      const c=$(`<div class="notif-card">
        <div class="notif-ico gold">${starMini()}</div>
        <div class="notif-body">
          <div class="notif-title">${title}</div>
          <div class="notif-txt">${txt}</div>
          <div class="notif-actions"></div>
        </div>
      </div>`);
      const acts=c.querySelector('.notif-actions');
      const yes=$(`<button class="btn b-gold sm">${fromGroup?'Sí, también en la general':'Sí, mostrarlo'}</button>`);
      const no=$(`<button class="btn b-ghost-d sm">${fromGroup?'Solo en el grupo':'No por ahora'}</button>`);
      yes.onclick=async()=>{ try{ await api('/api/featured/respond',{story_id:nt.id,accept:true}); toast(fromGroup?'¡Listo! Tu texto también estará en la comunidad general.':'¡Listo! Tu texto es el destacado de la comunidad.'); renderApp(); }catch(e){toast(e.message);} };
      no.onclick=async()=>{ try{ await api('/api/featured/respond',{story_id:nt.id,accept:false}); toast(fromGroup?'Perfecto, tu texto queda solo en el grupo.':'Entendido, no se mostrará. El puesto pasa al siguiente.'); renderApp(); }catch(e){toast(e.message);} };
      acts.appendChild(yes); acts.appendChild(no);
      el.appendChild(c);
    }
  });
}

        try{ await api('/api/editorial/'+it.id, null, 'DELETE'); toast('Publicación borrada.'); renderEditorial(el); }catch(e){toast(e.message);}

// --- Estrellas ---
function starSVG(){ return `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.7 1.4 6.8L12 17.8 5.9 21.2l1.4-6.8L2.2 9.7l6.9-.7z"/></svg>`; }
function fmtStars(v){ return Number.isInteger(v) ? String(v) : v.toFixed(1); }
function starEl(fillPct){
  const el=$(`<span class="star">${starSVG()}<span class="fill">${starSVG()}</span></span>`);
  el.querySelector('.fill').style.width=fillPct+'%';
  return el;
}
function readOnlyStars(value){
  const wrap=$(`<span class="stars ro"></span>`);
  for(let i=1;i<=5;i++){
    let pct=0; if(value>=i)pct=100; else if(value>i-1)pct=(value-(i-1))*100;
    wrap.appendChild(starEl(pct));
  }
  return wrap;
}
function makeStarPicker(onPick){
  const wrap=$(`<span class="stars"></span>`);
  const stars=[];
  let current=0;
  const paint=(val)=>{ for(let i=0;i<5;i++){ let pct=0; if(val>=i+1)pct=100; else if(val>i+0.5)pct=100; else if(val>i)pct=50; stars[i].querySelector('.fill').style.width=pct+'%'; } };
  for(let i=0;i<5;i++){
    const st=starEl(0); stars.push(st);
    // mitad izquierda = .5, mitad derecha = entero
    st.onmousemove=(e)=>{ const r=st.getBoundingClientRect(); const half=(e.clientX-r.left)<r.width/2; paint(i + (half?0.5:1)); };
    st.onmouseleave=()=>paint(current);
    st.onclick=(e)=>{ const r=st.getBoundingClientRect(); const half=(e.clientX-r.left)<r.width/2; current=i+(half?0.5:1); paint(current); onPick(current); };
    wrap.appendChild(st);
  }
  return wrap;
}

// ---------- PUBLICAR ----------
async function renderPub(el){
  el.innerHTML='';
  const card=$(`<div class="card"><div class="ci dark" style="color:var(--ink)"></div></div>`);
  const ci=card.querySelector('.ci');
  ci.appendChild($(`<div class="ttl">Publicar un texto</div>`));
  ci.appendChild($(`<div class="nda"><b>Confidencialidad:</b> cada lector acepta un compromiso de no copiar tu obra antes de leerla. Es un acuerdo simbólico entre la comunidad, no reemplaza el registro legal de tu obra según las leyes de tu país.</div>`));

  const titleF=$(`<input placeholder="Título del texto">`);
  const typeF=$(`<select>
    <option>Cuento</option>
    <option>Relato</option>
    <option>Reseña</option>
    <option>Capítulo de novela</option>
    <option>Guión</option>
    <option>Otro</option>
  </select>`);
  const genreF=$(`<input placeholder="Ej: Realismo, fantasía, terror…">`);
  const readersF=$(`<input type="number" min="1" max="10" value="2">`);
  const bodyF=$(`<textarea rows="9" placeholder="Pegá acá tu texto"></textarea>`);

  // Selector de destino: comunidad general (default) o un grupo
  let groups=[];
  try{ groups=await api('/api/groups'); GROUPS_CACHE=groups; }catch(e){}
  const destF=$(`<select><option value="0">Comunidad general</option>${groups.map(g=>`<option value="${g.id}">${esc(g.name)}${g.is_member?'':' (privado)'}</option>`).join('')}</select>`);
  // Campo de contraseña que aparece solo si elige un grupo del que NO es miembro
  const passWrap=$(`<div style="display:none"></div>`);
  const passF=$(`<input type="password" placeholder="Contraseña del grupo">`);
  passWrap.appendChild(wrapField('Contraseña del grupo (para unirte)', passF));

  ci.appendChild(wrapField('Título', titleF));
  ci.appendChild(wrapField('Tipo de texto', typeF));
  ci.appendChild(wrapField('¿Dónde querés publicar?', destF));
  ci.appendChild(passWrap);
  ci.appendChild(wrapField('Género', genreF));
  ci.appendChild(wrapField('¿Cuántos lectores secretos querés?', readersF));
  ci.appendChild(wrapField('Texto', bodyF));
  const charc=$(`<div class="charcount"></div>`); ci.appendChild(charc);
  const cost=$(`<div class="costnote"></div>`); ci.appendChild(cost);
  const err=$(`<div class="err" style="display:none"></div>`); ci.appendChild(err);
  const btn=$(`<button class="btn b-gold" style="margin-top:8px">Publicar texto</button>`);
  ci.appendChild(btn);
  card.appendChild($(`<div></div>`));
  el.appendChild(card);

  // Mostrar el campo de contraseña solo si elige un grupo del que no es miembro
  destF.onchange=()=>{
    const gid=parseInt(destF.value)||0;
    const g=groups.find(x=>x.id===gid);
    passWrap.style.display = (gid && g && !g.is_member) ? 'block' : 'none';
  };

  const pagesOf=()=>{ const w=bodyF.value.trim().split(/\s+/).filter(Boolean).length; return {w, p:w/275}; };
  const tierOf=(p)=>Math.max(1, Math.ceil((p-1e-9)/5));
  const update=()=>{
    const {w,p}=pagesOf();
    const n=Math.max(1,Math.min(10,parseInt(readersF.value)||1));
    if(!w){ charc.textContent=''; cost.textContent=`Tenés ${ME.credits} créditos.`; btn.disabled=false; return; }
    const per=tierOf(p);
    const total=per*n;
    charc.innerHTML=`${w} palabras ≈ <b>${p.toFixed(1)} carillas</b>`;
    const falta = total>ME.credits;
    cost.innerHTML = `Costo: <b>${per} crédito${per!==1?'s':''} por lector × ${n} = ${total} créditos</b>. Tenés ${ME.credits}.`
      + (falta ? ` <span style="color:var(--plum)">— Te faltan ${total-ME.credits}.</span>` : '');
    btn.disabled = falta;
  };
  readersF.oninput=update; bodyF.oninput=update;
  update();

  btn.onclick=async()=>{
    err.style.display='none';
    const gid=parseInt(destF.value)||0;
    const payload={title:titleF.value,type:typeF.value,genre:genreF.value,readers:readersF.value,body:bodyF.value,group_id:gid};
    const g=groups.find(x=>x.id===gid);
    if(gid && g && !g.is_member) payload.group_pass=passF.value;
    try{
      const r=await api('/api/stories',payload);
      ME.credits-=r.spent;
      toast(gid?`Texto publicado en el grupo. Se reservaron ${r.spent} créditos.`:`Texto publicado. Se reservaron ${r.spent} créditos.`);
      TAB='mios'; renderApp();
    }catch(e){err.textContent=e.message;err.style.display='block';}
  };
}

// ---------- MIS CUENTOS ----------
async function renderMios(el){
  el.innerHTML='';
  let mine;
  try{mine=await api('/api/mine');}catch(e){toast(e.message);return;}
  if(!mine.length){el.appendChild($(`<div class="empty-art"><div class="empty-art-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg></div><div class="empty-art-txt">Tu obra todavía no empezó a circular.<br><span>Publicá tu primer texto y dejá que los lectores secretos lo encuentren.</span></div></div>`));return;}
  mine.forEach(s=>{
    const avg = s.avg_rating!=null
      ? `<span class="avg-badge">${'★'} <span class="n">${s.avg_rating.toFixed(1)}</span> / 5 · ${s.rating_count} voto${s.rating_count!==1?'s':''}</span>` : '';
    const c=$(`<div class="card"><div class="ci">
      <span class="tag">${esc(s.type||'Texto')}</span><span class="tag">${s.genre||'Sin género'}</span><span class="tag">${pagesLabel(s)}</span>
      <div class="ttl">${esc(s.title)}</div>
      <div class="meta"><span>${s.reviews.length} devolución${s.reviews.length!==1?'es':''} recibida${s.reviews.length!==1?'s':''}</span>${avg}</div>
      <div class="regstamp">🔒 Registrado en la plataforma el ${fmtDateTime(s.created)}</div>
    </div></div>`);
    const ci=c.querySelector('.ci');
    const seeRow=$(`<div class="row"></div>`);
    const seeBtn=$(`<button class="btn b-ghost-d sm">Releer mi texto</button>`);
    let open=false;
    const txtBox=$(`<div class="selftext" style="display:none">${esc(s.body)}</div>`);
    seeBtn.onclick=()=>{ open=!open; txtBox.style.display=open?'block':'none'; seeBtn.textContent=open?'Ocultar texto':'Releer mi texto'; };
    seeRow.appendChild(seeBtn);
    // Borrar: solo si el texto todavía no recibió devoluciones (se devuelven los créditos)
    if(!s.reviews.length){
      const delBtn=$(`<button class="btn b-ghost-d sm" style="border-color:#d99;color:#a44">Borrar</button>`);
      delBtn.onclick=async()=>{
        const refund=s.cost_paid||0;
        if(!confirm(`¿Borrar "${s.title}"? Se te devolverán ${refund} crédito${refund!==1?'s':''}. Esta acción no se puede deshacer.`)) return;
        try{
          const r=await api('/api/mine/story/'+s.id, null, 'DELETE');
          if(r.refunded) ME.credits+=r.refunded;
          toast(r.refunded?`Texto borrado. +${r.refunded} créditos devueltos.`:'Texto borrado.');
          renderApp();
        }catch(e){toast(e.message);}
      };
      seeRow.appendChild(delBtn);
    }
    ci.appendChild(seeRow); ci.appendChild(txtBox);
    if(s.reviews.length){
      const box=$(`<div style="margin-top:10px"></div>`);
      s.reviews.forEach(r=>{
        const rv=$(`<div class="rv">
          <div class="who"></div>
          <p><b>Funciona:</b> ${esc(r.good)}</p>
          <p><b>Mejorar:</b> ${esc(r.improve)}</p>
          <p><b>General:</b> ${esc(r.overall)}</p>
        </div>`);
        // Encabezado: alias o nombre revelado + estrellas + fecha
        const who=rv.querySelector('.who');
        const left=$(`<span></span>`);
        if(r.reviewer_name){
          left.appendChild($(`<span class="revealed">✓ ${esc(r.reviewer_name)}</span>`));
        }else{
          left.appendChild($(`<span class="alias">${eyeMini()} ${r.alias}</span>`));
        }
        who.appendChild(left);
        const right=$(`<span style="display:flex;align-items:center;gap:8px"></span>`);
        if(r.rating>0) right.appendChild(readOnlyStars(r.rating));
        right.appendChild($(`<span>${new Date(r.created).toLocaleDateString()}</span>`));
        who.appendChild(right);
        // Fila de descubrir
        const rr=$(`<div class="reveal-row"></div>`);
        if(r.reviewer_name){
          rr.appendChild($(`<span class="revealed">Se descubrió: pueden conectar 🎉</span>`));
        }else if(r.reveal_status==='requested'){
          rr.appendChild($(`<span class="reveal-note">Pediste descubrir. Esperando respuesta del lector…</span>`));
        }else if(r.reveal_status==='declined'){
          rr.appendChild($(`<span class="reveal-note">El lector prefirió seguir en secreto.</span>`));
        }else{
          const b=$(`<button class="btn b-ghost-d sm">Descubrir quién fue</button>`);
          b.onclick=async()=>{ try{ await api('/api/reveal/request',{review_id:r.id}); toast('Pedido enviado. El lector decide si se descubre.'); renderApp(); }catch(e){toast(e.message);} };
          rr.appendChild(b);
          rr.appendChild($(`<span class="reveal-note">Si te sirvió, pedí conocer al lector.</span>`));
        }
        rv.appendChild(rr);
        box.appendChild(rv);
      });
      ci.appendChild(box);
    }
    el.appendChild(c);
  });
}

function starMini(){ return `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.7 1.4 6.8L12 17.8 5.9 21.2l1.4-6.8L2.2 9.7l6.9-.7z"/></svg>`; }

// Lectura del texto de la semana (solo lectura, sin devolución)
function openFeatured(f){
  const ov=$(`<div class="ov"></div>`);
  const m=$(`<div class="modal" style="max-width:640px">
    <h2>${esc(f.title)}</h2>
    <div class="sub">por ${esc(f.author)} · ${esc(f.genre||'Relato')} · ★ ${(Math.round(f.avg_rating*10)/10).toFixed(1)} / 5</div>

// ---------- PERFIL ----------
function renderPerfil(el){
  el.innerHTML='';
  const card=$(`<div class="card"><div class="ci"></div></div>`);
  const ci=card.querySelector('.ci');
  ci.appendChild($(`<div class="ttl">Tu perfil</div>`));
  ci.appendChild($(`<div class="meta">${esc(ME.email)}</div>`));

  // Foto de perfil
  let avatarData = ME.avatar || '';
  const initial=(ME.name||'?').trim().charAt(0).toUpperCase();
  const prev = avatarData
    ? $(`<img class="avatar-prev" src="${avatarData}" alt="foto">`)
    : $(`<div class="avatar-prev">${initial}</div>`);
  const fileInput=$(`<input type="file" accept="image/*" style="display:none">`);
  const pickBtn=$(`<button class="btn b-ghost-d sm" type="button">Subir foto</button>`);
  pickBtn.onclick=()=>fileInput.click();
  fileInput.onchange=()=>{
    const f=fileInput.files[0]; if(!f) return;
    const reader=new FileReader();
    reader.onload=(e)=>{
      const img=new Image();
      img.onload=()=>{
        // Redimensionamos a 240px máx para que la imagen no pese mucho
        const max=240; let w=img.width,h=img.height;
        if(w>h){ if(w>max){h=h*max/w;w=max;} } else { if(h>max){w=w*max/h;h=max;} }
        const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        avatarData=cv.toDataURL('image/jpeg',0.82);
        const np=$(`<img class="avatar-prev" src="${avatarData}" alt="foto">`);
        wrapAv.replaceChild(np, wrapAv.firstChild);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(f);
  };
  const wrapAv=$(`<div class="avatar-edit"></div>`);
  wrapAv.appendChild(prev);
  const avBtns=$(`<div></div>`); avBtns.appendChild(pickBtn); avBtns.appendChild(fileInput);
  wrapAv.appendChild(avBtns);
  ci.appendChild(wrapAv);

  const roleF=$(`<select>
    <option value="">— Elegí una opción —</option>
    <option>Lector/a apasionado/a</option>
    <option>Escritor/a aficionado/a</option>
    <option>Escritor/a en talleres</option>
    <option>Tallerista / docente</option>
    <option>Escritor/a publicado/a</option>
  </select>`);
  roleF.value=ME.role||'';
  const bioF=$(`<textarea rows="4" placeholder="Contá quién sos como lector/escritor, qué géneros te gustan, qué buscás en la comunidad">${esc(ME.bio||'')}</textarea>`);
  ci.appendChild(wrapField('¿Cómo te describís?', roleF));
  ci.appendChild(wrapField('Sobre vos', bioF));
  const btn=$(`<button class="btn b-wine" style="margin-top:4px">Guardar perfil</button>`);
  ci.appendChild(btn);
  card.appendChild($(`<div></div>`));
  el.appendChild(card);
  btn.onclick=async()=>{
    try{ME=await api('/api/profile',{role:roleF.value,bio:bioF.value,avatar:avatarData});toast('Perfil guardado.');}
    catch(e){toast(e.message);}
  };
}

function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
// Carillas y créditos (mismo criterio que el servidor)
function pagesOfStory(s){ const n=parseFloat(s.length); return isNaN(n)?0:n; }
function tierOfPages(p){ return Math.max(1, Math.ceil((p-1e-9)/5)); }
function pagesLabel(s){ const p=pagesOfStory(s); return p?`${p.toFixed(1)} carillas`:'—'; }
function rewardLabel(s){ return tierOfPages(pagesOfStory(s))*2; }
// Minutos de lectura (fórmula tipo Medium): palabras ÷ 220 ppm, redondeo hacia arriba, mínimo 1
const READING_WPM=220;
function readingMinutes(s){
  const words=pagesOfStory(s)*275; // las carillas se guardan como palabras/275
  return Math.max(1, Math.ceil(words/READING_WPM));
}
function minutesLabel(s){ const m=readingMinutes(s); return `${m} min de lectura`; }
